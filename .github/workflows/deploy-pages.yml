name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code
        run: pnpm exec vite --version

      - name: Test code
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Verify Pages artifact assets
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, existsSync } from 'node:fs';
          import { join } from 'node:path';

          const index = readFileSync('dist/index.html', 'utf8');
          const assetPaths = [...index.matchAll(/(?:src|href)="\/bangun-datar\/(assets\/[^\"]+)"/g)].map((match) => match[1]);
          if (assetPaths.length === 0) {
            throw new Error('No built asset references found in dist/index.html');
          }

          const missing = assetPaths.filter((assetPath) => !existsSync(join('dist', assetPath)));
          if (missing.length > 0) {
            throw new Error(`Missing built assets referenced by dist/index.html: ${missing.join(', ')}`);
          }
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
